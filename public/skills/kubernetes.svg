<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="k8sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326CE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A4D8E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g transform="translate(50, 50)">
    <!-- Kubernetes helm wheel - professional design -->
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#k8sGrad)" stroke-width="1.2" opacity="0.3"/>
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#k8sGrad)" stroke-width="1.5" opacity="0.5"/>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="7" fill="url(#k8sGrad)"/>
    <!-- Six main spokes for helm -->
    <!-- Top spoke -->
    <line x1="0" y1="0" x2="0" y2="-28" stroke="url(#k8sGrad)" stroke-width="2"/>
    <circle cx="0" cy="-28" r="5.5" fill="url(#k8sGrad)"/>
    <!-- Top-right spoke -->
    <line x1="0" y1="0" x2="24.2" y2="-14" stroke="url(#k8sGrad)" stroke-width="2"/>
    <circle cx="24.2" cy="-14" r="5.5" fill="url(#k8sGrad)"/>
    <!-- Bottom-right spoke -->
    <line x1="0" y1="0" x2="24.2" y2="14" stroke="url(#k8sGrad)" stroke-width="2"/>
    <circle cx="24.2" cy="14" r="5.5" fill="url(#k8sGrad)"/>
    <!-- Bottom spoke -->
    <line x1="0" y1="0" x2="0" y2="28" stroke="url(#k8sGrad)" stroke-width="2"/>
    <circle cx="0" cy="28" r="5.5" fill="url(#k8sGrad)"/>
    <!-- Bottom-left spoke -->
    <line x1="0" y1="0" x2="-24.2" y2="14" stroke="url(#k8sGrad)" stroke-width="2"/>
    <circle cx="-24.2" cy="14" r="5.5" fill="url(#k8sGrad)"/>
    <!-- Top-left spoke -->
    <line x1="0" y1="0" x2="-24.2" y2="-14" stroke="url(#k8sGrad)" stroke-width="2"/>
    <circle cx="-24.2" cy="-14" r="5.5" fill="url(#k8sGrad)"/>
  </g>
</svg>