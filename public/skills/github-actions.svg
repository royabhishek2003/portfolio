<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ghActGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2088FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g transform="translate(50, 50)">
    <!-- GitHub Actions workflow visualization -->
    <!-- Left trigger circle -->
    <circle cx="-28" cy="0" r="7" fill="url(#ghActGrad)"/>
    <!-- Arrow to first box -->
    <line x1="-21" y1="0" x2="-5" y2="0" stroke="url(#ghActGrad)" stroke-width="2.2" stroke-linecap="round"/>
    <polygon points="-3,0 -8,2.5 -8,-2.5" fill="url(#ghActGrad)"/>
    <!-- First process box -->
    <rect x="-16" y="-8" width="15" height="16" rx="2" fill="url(#ghActGrad)" opacity="0.9"/>
    <!-- Arrow to second box -->
    <line x1="1" y1="0" x2="17" y2="0" stroke="url(#ghActGrad)" stroke-width="2.2" stroke-linecap="round"/>
    <polygon points="19,0 14,2.5 14,-2.5" fill="url(#ghActGrad)"/>
    <!-- Second process box -->
    <rect x="17" y="-8" width="15" height="16" rx="2" fill="url(#ghActGrad)" opacity="0.75"/>
    <!-- Branch arrow up to success circle -->
    <line x1="24.5" y1="-8" x2="24.5" y2="-22" stroke="url(#ghActGrad)" stroke-width="1.8" stroke-dasharray="2.5,2" opacity="0.7"/>
    <!-- Success circle -->
    <circle cx="24.5" cy="-28" r="5" fill="url(#ghActGrad)" opacity="0.8"/>
  </g>
</svg>